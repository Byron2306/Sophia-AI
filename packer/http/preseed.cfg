# Arda OS: Debian Trixie Sovereign Preseed
d-i debian-installer/locale string en_US
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/get_hostname string arda-sovereign
d-i netcfg/get_domain string local

# APT Mirror (Debian Trixie)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Account Setup (Sovereign Arda User)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Arda Sovereign
d-i passwd/username string arda
d-i passwd/user-password password arda
d-i passwd/user-password-again password arda
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Partitioning (Atomic LVM)
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package Selection
tasksel tasksel/first multiselect standard, desktop, gnome-desktop
d-i pkgsel/include string sudo openssh-server build-essential python3 python3-pip libbpf-dev git git-lfs curl chromium x11-xserver-utils
d-i pkgsel/upgrade select full-upgrade

# GRUB (Sovereign Kernel Config)
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda

# Late command: Replicate kernel tuning and BPF LSM
d-i preseed/late_command string \
    in-target sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash lsm=landlock,lockdown,yama,integrity,bpf"/g' /etc/default/grub; \
    in-target update-grub; \
    in-target systemctl enable ssh; \
    echo 'arda  ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/arda; \
    chmod 440 /target/etc/sudoers.d/arda;

# Finish installation
d-i finish-install/reboot_directly boolean true
